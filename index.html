<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Dr Sumanta Majumdar | Personal Site</title>
    <style>
        body {
            background: linear-gradient(120deg, #ffecd2 0%, #fcb69f 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #333;
            margin: 0;
            padding: 0;
        }
        header {
            background: linear-gradient(90deg, #43cea2 0%, #185a9d 100%);
            color: #fff;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 20px rgba(33, 150, 243, 0.1);
        }
        header img {
            border-radius: 50%;
            border: 4px solid #fff;
            width: 120px;
            height: 120px;
            margin-top: 1rem;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        main {
            max-width: 700px;
            margin: 2rem auto;
            background: rgba(255,255,255,0.8);
            border-radius: 1rem;
            box-shadow: 0 2px 16px rgba(33,150,243,0.1);
            padding: 2rem;
        }
        h1, h2 {
            font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
            font-weight: 700;
        }
        section {
            margin-bottom: 2rem;
        }
        label {
            display: block;
            margin-top: 1rem;
            font-weight: 600;
        }
        input, textarea {
            width: 100%;
            border-radius: 6px;
            border: 1px solid #43cea2;
            margin-top: 0.5rem;
            padding: 0.5rem;
            font-size: 1rem;
            background: #fafafa;
            transition: border 0.2s;
        }
        input:focus, textarea:focus {
            border: 2px solid #185a9d;
            outline: none;
        }
        button {
            margin-top: 1rem;
            background: linear-gradient(90deg, #43cea2 0%, #185a9d 100%);
            color: #fff;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            padding: 0.75rem 2rem;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(33,150,243,0.15);
            transition: background 0.2s;
        }
        button:hover {
            background: linear-gradient(90deg, #185a9d 0%, #43cea2 100%);
        }
        #wip-animation {
            text-align: center;
            margin-bottom: 2rem;
        }
        .wip-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .wip-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 8px;
            animation: spin 2s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0);}
            100% {transform: rotate(360deg);}
        }
        .wip-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: #185a9d;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1;}
            50% { opacity: 0.5;}
        }
        #myCanvas {
            margin-top: 2rem;
            width: 100%;
            height: 200px;
            background: rgba(33,150,243,0.04);
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(33,150,243,0.07);
            display: block;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Personal Site</h1>
        <h2>Dr Sumanta Majumdar</h2>
        <img src="assets/photo-placeholder.png" alt="Dr Sumanta Majumdar's Photo" />
    </header>
    <main>
        <div id="wip-animation">
            <div class="wip-container">
                <svg class="wip-icon" viewBox="0 0 64 64">
                    <circle cx="32" cy="32" r="30" stroke="#185a9d" stroke-width="4" fill="none"/>
                    <rect x="28" y="12" width="8" height="24" rx="4" fill="#43cea2"/>
                    <rect x="28" y="40" width="8" height="12" rx="4" fill="#fcb69f"/>
                </svg>
                <span class="wip-text">Work In Progress...</span>
            </div>
        </div>
        <section>
            <h2>About Me</h2>
            <p>Hi, I'm <strong>Dr Sumanta Majumdar</strong>. This is a vibrant personal website for sharing my journey, expertise, and connecting with patients and colleagues. Stay tuned for more updates!</p>
        </section>
        <section>
            <h2>Feedback Form</h2>
            <form id="feedback-form">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required placeholder="Your name (Dr Sumanta Majumdar)">
                <label for="message">Message:</label>
                <textarea id="message" name="message" required placeholder="Your feedback"></textarea>
                <button type="submit">Submit</button>
            </form>
        </section>
        <canvas id="myCanvas"></canvas>
    </main>
    <script src="script.js"></script>
</body>
</html>
